{% extends 'base.html' %}
{% block title %}Sign In — T&TG Trade Corp{% endblock %}
{% block content %}
<div style="min-height:100vh;display:flex;align-items:center;background:linear-gradient(135deg,var(--bg-dark),var(--bg-card));padding:4rem 0">
<div class="container">
  <div class="row justify-content-center">
    <div class="col-md-5">
      <div class="text-center mb-4">
        {% load static %}
      <img src="{% static 'images/tg_logo.jpeg' %}" alt="T&TG Logo" style="width:80px;height:80px;object-fit:contain;background:#fff;border-radius:14px;padding:4px;box-shadow:0 4px 20px rgba(201,168,76,.3);margin-bottom:.5rem">
        <h2 class="text-gold">Welcome Back</h2>
        <p class="text-muted" style="font-size:.875rem">Sign in to your T&TG Trade Corp account</p>
      </div>
      <div class="glass-card p-4 p-lg-5">
        <form method="post">
          {% csrf_token %}
          <div class="mb-3">
            <label class="form-label">Username</label>
            <div class="input-group">
              <span class="input-group-text"><i class="fas fa-user"></i></span>
              <input type="text" name="username" class="form-control" placeholder="Your username" required>
            </div>
          </div>
          <div class="mb-4">
            <label class="form-label">Password</label>
            <div class="input-group">
              <span class="input-group-text"><i class="fas fa-lock"></i></span>
              <input type="password" name="password" class="form-control" placeholder="••••••••" required>
            </div>
          </div>
          <button type="submit" class="btn btn-gold w-100 btn-lg">
            <i class="fas fa-sign-in-alt me-2"></i>Sign In
          </button>
        </form>
        <div class="text-center mt-4 pt-3" style="border-top:1px solid var(--border)">
          <span class="text-muted" style="font-size:.875rem">New to T&TG? </span>
          <a href="{% url 'register' %}" class="text-gold fw-bold">Create Account</a>
        </div>
      </div>
      <div class="text-center mt-4">
        <div class="d-flex justify-content-center gap-3 flex-wrap small text-muted">
          <span>🇨🇦 Canada</span><span>🇺🇬 Uganda</span><span>🇳🇱 Netherlands</span>
          <span>🇺🇸 USA</span><span>🇰🇪 Kenya</span><span>🇯🇵 Japan</span>
        </div>
      </div>
    </div>
  </div>
</div>
</div>
{% endblock %}
