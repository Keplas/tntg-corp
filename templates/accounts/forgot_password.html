{% extends 'base.html' %}
{% block title %}Forgot Password — T&TG Trade Corp{% endblock %}
{% block content %}
<section style="background:#0a0a0a;min-height:80vh;display:flex;align-items:center;padding:60px 0">
 <div class="container">
 <div class="row justify-content-center">
 <div class="col-md-5">
 <div style="background:rgba(255,255,255,.03);border:1px solid rgba(201,168,76,.2);border-radius:20px;padding:40px">
 <div class="text-center mb-4">
 <div style="width:60px;height:60px;border-radius:50%;background:rgba(201,168,76,.12);display:flex;align-items:center;justify-content:center;margin:0 auto 16px;font-size:1.6rem"></div>
 <h2 style="color:#fff;font-weight:900">Forgot Password?</h2>
 <p style="color:#7a6e5f;font-size:.9rem">Enter your email and we'll send a reset link</p>
 </div>
 {% if messages %}{% for m in messages %}<div class="alert alert-{{ m.tags }} mb-3" style="border-radius:10px;font-size:.85rem">{{ m }}</div>{% endfor %}{% endif %}
 <form method="POST">
 {% csrf_token %}
 <div class="mb-4">
 <label style="color:#7a6e5f;font-size:.8rem;display:block;margin-bottom:6px">Email Address</label>
 <input type="email" name="email" class="form-control" style="background:rgba(255,255,255,.05);border:1px solid rgba(201,168,76,.2);color:#e0d5c0;border-radius:10px;padding:12px" placeholder="your@email.com" required>
 </div>
 <button type="submit" class="btn btn-gold w-100 py-3 fw-700">Send Reset Link</button>
 </form>
 <div class="text-center mt-4">
 <a href="{% url 'login' %}" style="color:#7a6e5f;font-size:.85rem;text-decoration:none">← Back to Sign In</a>
 </div>
 </div>
 </div>
 </div>
 </div>
</section>
{% endblock %}
