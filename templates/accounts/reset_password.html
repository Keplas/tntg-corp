{% extends 'base.html' %}
{% block title %}Reset Password — T&TG Trade Corp{% endblock %}
{% block content %}
<section style="background:#0a0a0a;min-height:80vh;display:flex;align-items:center;padding:60px 0">
  <div class="container">
    <div class="row justify-content-center">
      <div class="col-md-5">
        <div style="background:rgba(255,255,255,.03);border:1px solid rgba(201,168,76,.2);border-radius:20px;padding:40px">
          <div class="text-center mb-4">
            <div style="width:60px;height:60px;border-radius:50%;background:rgba(201,168,76,.12);display:flex;align-items:center;justify-content:center;margin:0 auto 16px;font-size:1.6rem">🔒</div>
            <h2 style="color:#fff;font-weight:900">Set New Password</h2>
            <p style="color:#7a6e5f;font-size:.9rem">Choose a strong password for your account</p>
          </div>
          {% if messages %}{% for m in messages %}<div class="alert mb-3" style="border-radius:10px;font-size:.85rem;background:rgba(239,68,68,.15);color:#f87171;border:1px solid rgba(239,68,68,.3)">{{ m }}</div>{% endfor %}{% endif %}
          <form method="POST">
            {% csrf_token %}
            <div class="mb-3">
              <label style="color:#7a6e5f;font-size:.8rem;display:block;margin-bottom:6px">New Password</label>
              <input type="password" name="password" class="form-control" style="background:rgba(255,255,255,.05);border:1px solid rgba(201,168,76,.2);color:#e0d5c0;border-radius:10px;padding:12px" placeholder="Min 8 characters" required>
            </div>
            <div class="mb-4">
              <label style="color:#7a6e5f;font-size:.8rem;display:block;margin-bottom:6px">Confirm Password</label>
              <input type="password" name="confirm_password" class="form-control" style="background:rgba(255,255,255,.05);border:1px solid rgba(201,168,76,.2);color:#e0d5c0;border-radius:10px;padding:12px" placeholder="Repeat password" required>
            </div>
            <button type="submit" class="btn btn-gold w-100 py-3 fw-700">Reset Password</button>
          </form>
        </div>
      </div>
    </div>
  </div>
</section>
{% endblock %}
